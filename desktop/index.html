<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles.css" />
    <title>ShotShield</title>
    <script type="module" src="/src/main.ts"></script>
  </head>

  <body>
    <main>
      <header>
        <h1>ShotShield</h1>
        <p class="tagline">Find sensitive data before you share it.</p>
      </header>

      <div id="stage" class="stage" tabindex="0" role="button"
           aria-label="Drop, paste, or choose an image to scan">
        <div id="stagePrompt" class="stage-prompt">
          <p class="stage-hint">Drop a screenshot, paste, or <span class="link">choose an image</span></p>
          <p class="stage-sub">ID cards, bank cards, configs — scanned on your device, nothing uploaded.</p>
        </div>
        <canvas id="canvas" class="canvas" hidden></canvas>
        <div id="drawbox" class="draw-box" hidden></div>
        <div id="progress" class="progress" hidden><div id="progressBar" class="progress-bar"></div></div>
        <input id="file" type="file" accept="image/*" hidden />
      </div>

      <p id="drawHint" class="draw-hint" hidden>
        Drag on the image to redact an area by hand — a face, an address, anything the scan misses.
      </p>

      <div class="stage-actions">
        <button id="rotate" class="btn" hidden>Rotate</button>
        <button id="compare" class="btn" hidden>Hold to compare</button>
        <button id="clear" class="btn" hidden>Clear</button>
        <button id="export" class="btn btn-primary" hidden>Save redacted image</button>
      </div>

      <details class="fallback">
        <summary>or paste text</summary>
        <textarea
          id="input"
          spellcheck="false"
          placeholder="Paste text to scan — an .env file, a log, a config…"
        ></textarea>
      </details>

      <p id="summary" class="summary"></p>
      <div id="results" class="results"></div>
    </main>
  </body>
</html>

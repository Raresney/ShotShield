name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      # Keep building the other platforms even if one fails, so a Linux hiccup
      # never blocks the Windows release (and its updater manifest).
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Tauri's Linux build needs the WebKitGTK stack and packaging tools.
      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libxdo-dev \
            libssl-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - run: npm ci

      # On a tag push this publishes (or appends to) the release with this
      # platform's installer attached; tauri-action merges each matrix job into
      # one latest.json for the updater. A manual run leaves tagName empty, so it
      # only builds and proves the pipeline works without cutting a release.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the bundles and emits the latest.json manifest the in-app
          # updater reads. Set these secrets in the repo before tagging a release.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ShotShield ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
